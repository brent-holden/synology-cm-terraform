---
# Ansible playbook to set up users and directories for Synology Container Manager
# Run with: ansible-playbook -i inventory.yml create-directories.yml

- name: Set up users and directories for Docker containers on Synology NAS
  hosts: synology
  become: true

  vars:
    # User/group for directory ownership (match PUID/PGID in Terraform configs)
    plex_user: plex
    plex_uid: 1027
    media_group: media
    media_gid: 100

    # Base paths
    docker_base: /volume1/docker
    media_base: /volume1/media

    # Container config directories
    container_config_dirs:
      - "{{ docker_base }}/sabnzbd/config"

    # Consul directories (root-owned)
    consul_dirs:
      - "{{ docker_base }}/consul/config"
      - "{{ docker_base }}/consul/data"

    # Nomad directories (root-owned, separate from media containers)
    nomad_dirs:
      - "{{ docker_base }}/nomad/config"
      - "{{ docker_base }}/nomad/data"

    # Media directories
    media_dirs:
      - "{{ media_base }}/movies"
      - "{{ media_base }}/tv"
      - "{{ media_base }}/downloads/incomplete"
      - "{{ media_base }}/downloads/complete"
      - "{{ media_base }}/downloads/complete/movies"
      - "{{ media_base }}/downloads/complete/tv"

  tasks:
    # User and group setup (must happen before directory creation)
    - name: Create media group
      ansible.builtin.group:
        name: "{{ media_group }}"
        gid: "{{ media_gid }}"
        state: present

    - name: Create plex user
      ansible.builtin.user:
        name: "{{ plex_user }}"
        uid: "{{ plex_uid }}"
        group: "{{ media_group }}"
        groups:
          - "{{ media_group }}"
          - docker
          - users
        append: false
        shell: /sbin/nologin
        create_home: false
        system: true
        state: present

    # Directory creation (happens after user/group setup)
    - name: Create container config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ plex_user }}"
        group: "{{ media_group }}"
        mode: "0755"
      loop: "{{ container_config_dirs }}"

    - name: Create media directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ plex_user }}"
        group: "{{ media_group }}"
        mode: "0755"
      loop: "{{ media_dirs }}"

    - name: Create Consul directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ consul_dirs }}"

    - name: Create Nomad directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ nomad_dirs }}"

    - name: Deploy Consul server configuration
      ansible.builtin.copy:
        src: files/consul-server.hcl
        dest: "{{ docker_base }}/consul/config/consul.hcl"
        owner: root
        group: root
        mode: "0644"

    - name: Deploy Nomad server configuration
      ansible.builtin.copy:
        src: files/nomad-server.hcl
        dest: "{{ docker_base }}/nomad/config/nomad.hcl"
        owner: root
        group: root
        mode: "0644"

    - name: Display summary
      ansible.builtin.debug:
        msg: |
          Created group '{{ media_group }}' with GID {{ media_gid }}
          Created user '{{ plex_user }}' with UID {{ plex_uid }} (no interactive login)
          User '{{ plex_user }}' is a member of groups: {{ media_group }}, docker, users
          Created {{ container_config_dirs | length }} container config directories
          Created {{ media_dirs | length }} media directories
          Created {{ consul_dirs | length }} Consul directories (root-owned)
          Created {{ nomad_dirs | length }} Nomad directories (root-owned)
          Deployed Consul server config to {{ docker_base }}/consul/config/consul.hcl
          Deployed Nomad server config to {{ docker_base }}/nomad/config/nomad.hcl
          All media directories owned by {{ plex_user }}:{{ media_group }}
